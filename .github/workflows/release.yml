# Build the standalone `specline` CLI for every platform and attach it to the release.
# Everything cross-compiles on a single LINUX runner — NO macOS runners, which GitHub
# bills at ~10x (see CLAUDE.md). bun cross-compiles to darwin from linux. The native
# linux binary is run as the smoke test (it proves the embedded canon is served from a
# compiled binary, the one thing that could break); the cross-compiled macOS binaries
# come from the same embed and are checked for existence/size. (Their runtime was
# proven on a real macOS+Rosetta run for v2.6.1 before this workflow went linux-only.)
# Fires on a published release, or dispatchable against a tag.
name: release-binaries
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (e.g. v2.6.1)"
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: oven-sh/setup-bun@v2
      - name: Bundle integrity (canon file + embedded copy match the source)
        run: node scripts/sync-canon.mjs --check
      - name: Compile all targets (cross-compiled on Linux)
        run: |
          mkdir -p dist
          for t in linux-x64 darwin-arm64 darwin-x64; do
            bun build src/cli/index.ts --compile --target=bun-$t --outfile "dist/specline-$t"
          done
      - name: Smoke test (native linux binary must serve its embedded canon)
        run: |
          ./dist/specline-linux-x64 spec | grep -q "Canon version:" || { echo "binary cannot serve its canon"; exit 1; }
          ./dist/specline-linux-x64 rules | grep -q "STRUCT-MISSING-SPEC" || { echo "rule catalog missing"; exit 1; }
          echo "smoke ok: $(./dist/specline-linux-x64 spec | grep -m1 'Canon version:')"
      - name: Verify the cross-compiled macOS binaries built
        run: |
          for t in darwin-arm64 darwin-x64; do
            [ -s "dist/specline-$t" ] && [ "$(stat -c%s "dist/specline-$t")" -gt 1000000 ] || { echo "specline-$t missing or too small"; exit 1; }
          done
      - name: Attach binaries to the release
        run: |
          for t in linux-x64 darwin-arm64 darwin-x64; do
            gh release upload "$TAG" "dist/specline-$t" --clobber --repo "$GITHUB_REPOSITORY"
          done
