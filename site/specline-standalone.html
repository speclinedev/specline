  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"74e7b927-36f0-4c43-be14-8b3a0a6d5647\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"74258f1a-8acb-4120-828a-88f6ab8aef3e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1184b1cc-c91d-4c73-a8f4-b8b14c2f3b49\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"305d26ac-4959-43cf-b4d8-82341ae5be05\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Spec Flow — web book stylesheet\n   Theming via [data-theme=\"dark|paper\"] on <html>. Single type pairing.\n   ============================================================ */\n\n/* ---------- type pairing (Space Grotesk / Spectral / IBM Plex Mono) ---------- */\n:root {\n  --font-head: 'Space Grotesk', system-ui, sans-serif;\n  --font-body: 'Spectral', Georgia, serif;\n  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n/* ---------- color themes ---------- */\n:root, html[data-theme=\"dark\"] {\n  --bg: #131311;\n  --bg-2: #1A1A17;\n  --panel: #1C1C19;\n  --panel-2: #232320;\n  --border: #2C2C28;\n  --border-2: #3A3A35;\n  --ink: #ECE8DE;\n  --ink-strong: #FBF9F3;\n  --muted: #9D998D;\n  --dim: #6A675E;\n  --faint: #44423B;\n  --accent: #CE3B22;\n  --accent-soft: rgba(206,59,34,0.13);\n  --code-bg: #1A1A17;\n  --shadow: 0 1px 0 rgba(255,255,255,0.02), 0 18px 40px -24px rgba(0,0,0,0.7);\n  /* lifecycle / state colors */\n  --st-draft: #8C887C;\n  --st-ratified: #6E97D6;\n  --st-building: #D98A3A;\n  --st-blocked: #D2554A;\n  --st-shipped: #6FBF8E;\n  --st-killed: #6A675E;\n  color-scheme: dark;\n}\nhtml[data-theme=\"paper\"] {\n  --bg: #F4F0E6;\n  --bg-2: #EFEADD;\n  --panel: #FBF8F0;\n  --panel-2: #F0ECDF;\n  --border: #DCD4C2;\n  --border-2: #CDC4AE;\n  --ink: #221F16;\n  --ink-strong: #100E08;\n  --muted: #6E6757;\n  --dim: #938B79;\n  --faint: #C7BEA9;\n  --accent: #CE3B22;\n  --accent-soft: rgba(206,59,34,0.10);\n  --code-bg: #ECE7D8;\n  --shadow: 0 1px 0 rgba(255,255,255,0.6), 0 16px 34px -26px rgba(80,60,30,0.45);\n  --st-draft: #8C8472;\n  --st-ratified: #3E6FB0;\n  --st-building: #B6722A;\n  --st-blocked: #BE4034;\n  --st-shipped: #3D8C5F;\n  --st-killed: #938B79;\n  color-scheme: light;\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n\nbody {\n  margin: 0;\n  overflow-x: hidden;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-size: 19px;\n  line-height: 1.62;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- top progress + header ---------- */\n.progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--accent); z-index: 60; transition: width 0.1s linear; }\n.topbar {\n  position: fixed; top: 0; left: 0; right: 0; height: 58px; z-index: 50;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 26px;\n  background: color-mix(in oklab, var(--bg) 88%, transparent);\n  backdrop-filter: blur(10px);\n  border-bottom: 1px solid var(--border);\n}\n.topbar .tb-left { display: flex; align-items: center; gap: 16px; }\n.topbar .mark { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 600; font-size: 18px; letter-spacing: -0.01em; color: var(--ink-strong); text-decoration: none; }\n.topbar .mark .glyph { width: 15px; height: 15px; background: var(--accent); transform: rotate(45deg); }\n.topbar .right { display: flex; align-items: center; gap: 20px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }\n.topbar .right a { color: var(--muted); text-decoration: none; }\n.topbar .right a:hover { color: var(--ink); }\n.topbar .canon { color: var(--dim); }\n.topbar .tb-agents { color: var(--accent) !important; }\n.topbar .tb-agents:hover { color: var(--accent) !important; opacity: 0.8; }\n.tb-theme {\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;\n  color: var(--ink); background: transparent; border: 1px solid var(--border-2); border-radius: 6px;\n  padding: 6px 12px; cursor: pointer; min-width: 64px;\n}\n.tb-theme:hover { border-color: var(--accent); color: var(--ink-strong); }\n.tb-menu {\n  display: none; align-items: center; gap: 8px; cursor: pointer;\n  font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: var(--ink); background: transparent; border: 1px solid var(--border-2); border-radius: 6px; padding: 7px 12px;\n}\n.tb-menu .bars { width: 14px; height: 2px; background: currentColor; position: relative; display: inline-block; }\n.tb-menu .bars::before, .tb-menu .bars::after { content: ''; position: absolute; left: 0; width: 14px; height: 2px; background: currentColor; }\n.tb-menu .bars::before { top: -5px; } .tb-menu .bars::after { top: 5px; }\n.toc-backdrop { display: none; }\n\n/* ---------- left TOC ---------- */\n.toc {\n  position: fixed; top: 58px; left: 0; width: 248px; bottom: 0;\n  padding: 30px 18px 30px 26px; overflow-y: auto;\n  border-right: 1px solid var(--border);\n}\n.toc .toc-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin: 0 0 14px 10px; }\n.toc ol { list-style: none; margin: 0; padding: 0; counter-reset: toc; }\n.toc li { margin: 0; }\n.toc a {\n  display: flex; gap: 11px; align-items: baseline;\n  padding: 6px 10px; border-radius: 6px;\n  font-family: var(--font-head); font-size: 14px; line-height: 1.3; font-weight: 400;\n  color: var(--muted); text-decoration: none;\n  border-left: 2px solid transparent; margin-left: -2px;\n}\n.toc a .num { font-family: var(--font-mono); font-size: 11px; color: var(--dim); min-width: 18px; }\n.toc a:hover { color: var(--ink); background: var(--bg-2); }\n.toc a.active { color: var(--ink-strong); border-left-color: var(--accent); background: var(--accent-soft); }\n.toc a.active .num { color: var(--accent); }\n\n/* ---------- reading column ---------- */\n.book { margin-left: 248px; }\n.wrap { max-width: 720px; margin: 0 auto; padding: 0 32px; }\n.chapter { padding: 96px 0 40px; scroll-margin-top: 72px; }\n.chapter:first-of-type { padding-top: 0; }\n\n.head-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin: 0 0 18px; }\n.chapter > .wrap > h2 { font-family: var(--font-head); font-weight: 500; font-size: 40px; line-height: 1.05; letter-spacing: -0.025em; color: var(--ink-strong); margin: 0 0 8px; }\n.chapter-meta { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin: 0 0 34px; }\n\n.book p { margin: 0 0 22px; max-width: 64ch; }\n.book h3 { font-family: var(--font-head); font-weight: 600; font-size: 22px; letter-spacing: -0.01em; color: var(--ink-strong); margin: 40px 0 14px; }\n.book h4 { font-family: var(--font-head); font-weight: 600; font-size: 16px; color: var(--ink-strong); margin: 30px 0 10px; }\n.book strong { color: var(--ink-strong); font-weight: 600; }\n.book em { font-style: italic; color: var(--ink); }\n.book a.ref { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in oklab, var(--accent) 40%, transparent); }\n.book a.ref:hover { border-bottom-color: var(--accent); }\n.lead { font-size: 23px; line-height: 1.5; color: var(--ink); }\n.lead strong { color: var(--ink-strong); }\n\ncode, .mono { font-family: var(--font-mono); }\n.book p code, .book li code, td code { font-family: var(--font-mono); font-size: 0.82em; background: var(--code-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--ink); white-space: nowrap; }\n\nul.book-list, ol.book-list { max-width: 64ch; margin: 0 0 22px; padding-left: 0; list-style: none; }\nul.book-list li, ol.book-list li { position: relative; padding-left: 28px; margin-bottom: 12px; }\nul.book-list li::before { content: ''; position: absolute; left: 6px; top: 0.62em; width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); }\nol.book-list { counter-reset: bl; }\nol.book-list li::before { counter-increment: bl; content: counter(bl,decimal-leading-zero); position: absolute; left: 0; top: 0.1em; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }\n\n/* ---------- margin notes ---------- */\n.note {\n  float: right; clear: right; width: 238px; margin: 8px 0 18px 30px;\n  font-family: var(--font-body); font-size: 15px; line-height: 1.5; color: var(--muted);\n  border-top: 2px solid var(--accent); padding-top: 10px;\n}\n.note .note-k { display: block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }\n.note code { font-family: var(--font-mono); font-size: 0.86em; color: var(--ink); }\n@media (max-width: 680px) {\n  .note { float: none; width: auto; margin: 18px 0; padding: 14px 16px; border-top: none; border-left: 2px solid var(--accent); background: var(--bg-2); border-radius: 0 6px 6px 0; }\n}\n\n/* ---------- pull quote ---------- */\n.pull { margin: 40px 0; padding-left: 24px; border-left: 3px solid var(--accent); }\n.pull p { font-family: var(--font-head); font-weight: 500; font-size: 27px; line-height: 1.28; letter-spacing: -0.015em; color: var(--ink-strong); max-width: 20ch; margin: 0; }\n\n/* ---------- code block ---------- */\n.codeblock { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; margin: 26px 0; overflow: hidden; box-shadow: var(--shadow); }\n.codeblock .cb-bar { display: flex; align-items: center; gap: 7px; padding: 11px 15px; border-bottom: 1px solid var(--border); }\n.codeblock .cb-bar .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--faint); }\n.codeblock .cb-bar .fn { font-family: var(--font-mono); font-size: 12px; color: var(--dim); margin-left: 8px; }\n.codeblock pre { margin: 0; padding: 18px 20px; overflow-x: auto; font-family: var(--font-mono); font-size: 13.5px; line-height: 1.75; color: var(--ink); }\n.codeblock .tree-dim, .codeblock pre .dl { color: var(--dim); }\n.codeblock .k { color: var(--muted); }\n.codeblock .v { color: var(--ink); }\n.codeblock .cmt { color: var(--dim); font-style: italic; }\n.codeblock .acc { color: var(--accent); }\n.codeblock .grn { color: var(--st-shipped); }\n.codeblock .blu { color: var(--st-ratified); }\n\n/* ---------- the loop figure ---------- */\nfigure { margin: 38px 0; }\nfigure figcaption { font-family: var(--font-mono); font-size: 12px; color: var(--dim); margin-top: 14px; letter-spacing: 0.04em; }\n.loop-fig { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px 28px 26px; box-shadow: var(--shadow); }\n.loop-nodes { display: grid; grid-template-columns: repeat(4, 1fr); }\n.loop-node { position: relative; padding: 4px 16px 4px 0; }\n.loop-node .ln { font-family: var(--font-mono); font-size: 11px; color: var(--dim); letter-spacing: 0.12em; }\n.loop-node h5 { font-family: var(--font-head); font-weight: 600; font-size: 21px; letter-spacing: -0.01em; margin: 7px 0 5px; color: var(--ink-strong); }\n.loop-node .who { font-family: var(--font-mono); font-size: 11.5px; color: var(--accent); }\n.loop-node .arr { position: absolute; right: 8px; top: 16px; color: var(--dim); font-family: var(--font-head); font-size: 16px; }\n.loop-return { margin-top: 16px; height: 38px; border: 1.5px solid var(--border-2); border-top: none; border-radius: 0 0 12px 12px; position: relative; }\n.loop-return .lbl { position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%); background: var(--panel); padding: 0 12px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }\n.loop-return .tip { position: absolute; left: 12.5%; bottom: -10px; transform: translateX(-50%); color: var(--accent); font-family: var(--font-head); font-size: 17px; }\n\n/* ---------- state strip ---------- */\n.states { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 30px 0; }\n.state-chip { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 13px; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel); }\n.state-chip .pip { width: 8px; height: 8px; border-radius: 50%; }\n.states .sep { color: var(--dim); font-family: var(--font-head); }\n\n/* ---------- boundary cards ---------- */\n.boundaries { display: grid; gap: 14px; margin: 30px 0 10px; }\n.bcard { display: grid; grid-template-columns: 64px 1fr; gap: 4px 22px; padding: 22px 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; box-s { flex: 1; max-width: 1080px; margin: 0 auto; width: 100%; padding: 64px 44px 48px; display: flex; flex-direction: column; }\n.cover-top { display: flex; justify-content: space-between; align-items: center; padding-bottom: 18px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }\n.cover-body { flex: 1; display: grid; grid-template-columns: 1fr 330px; gap: 60px; padding-top: 58px; }\n.cover h1 { font-family: var(--font-head); font-weight: 500; font-size: 78px; line-height: 0.97; letter-spacing: -0.035em; margin: 0; color: var(--ink-strong); }\n.cover h1 .a { color: var(--accent); }\n.cover .cover-sub { font-family: var(--font-body); font-size: 23px; line-height: 1.46; color: var(--ink); max-width: 28em; margin: 30px 0 0; }\n.cover .cover-sub strong { color: var(--ink-strong); font-weight: 600; }\n.cover .cover-ctas { display: flex; align-items: center; gap: 24px; margin-top: 42px; }\n.btn-primary { font-family: var(--font-head); font-weight: 500; font-size: 16px; padding: 14px 24px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 7px; display: inline-flex; gap: 9px; align-items: center; }\n.btn-primary:hover { filter: brightness(1.08); }\n.btn-link { font-family: var(--font-head); font-size: 16px; color: var(--ink); text-decoration: none; border-bottom: 1.5px solid var(--accent); padding-bottom: 2px; }\n.colophon { align-self: start; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--panel); box-shadow: var(--shadow); }\n.colophon .co-row { display: grid; grid-template-columns: 92px 1fr; gap: 12px; padding: 13px 18px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 12.5px; line-height: 1.5; }\n.colophon .co-row:last-child { border-bottom: none; }\n.colophon .co-k { color: var(--dim); letter-spacing: 0.08em; }\n.colophon .co-v { color: var(--ink); }\n.colophon .co-v .hl { color: var(--accent); }\n.cover-strip { display: flex; gap: 26px; flex-wrap: wrap; padding-top: 22px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }\n.cover-strip a { color: var(--dim); text-decoration: none; }\n.cover-strip a:hover { color: var(--ink); }\n\n/* ---------- end CTA ---------- */\n.endcta { margin: 40px 0 0; padding: 44px 40px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; text-align: center; box-shadow: var(--shadow); }\n.endcta h3 { font-family: var(--font-head); font-weight: 500; font-size: 30px; letter-spacing: -0.02em; color: var(--ink-strong); margin: 0 0 12px; }\n.endcta p { margin: 0 auto 26px; color: var(--muted); max-width: 46ch; }\n.endcta .row { display: flex; gap: 18px; justify-content: center; align-items: center; }\n\nfooter.book-footer { margin-left: 248px; border-top: 1px solid var(--border); margin-top: 70px; }\nfooter.book-footer .wrap { padding-top: 30px; padding-bottom: 50px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em; color: var(--dim); }\n\n/* ---------- responsive ---------- */\n@media (max-width: 1080px) {\n  .toc {\n    width: 290px; max-width: 86vw; padding-top: 24px;\n    background: var(--bg); border-right: 1px solid var(--border);\n    transform: translateX(-101%); transition: transform 0.26s ease; z-index: 70;\n    box-shadow: 18px 0 40px -24px rgba(0,0,0,0.6);\n  }\n  body.toc-open .toc { transform: translateX(0); }\n  .toc-backdrop { position: fixed; inset: 58px 0 0; background: rgba(0,0,0,0.4); z-index: 65; opacity: 0; pointer-events: none; transition: opacity 0.26s ease; }\n  body.toc-open .toc-backdrop { display: block; opacity: 1; pointer-events: auto; }\n  .tb-menu { display: inline-flex; }\n  .book, footer.book-footer, .cover { margin-left: 0; }\n  .cover-bod  }\n.curl code .flag { color: var(--st-ratified); }\n.curl .copy { flex: none; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 6px; padding: 9px 14px; cursor: pointer; }\n.curl .copy:hover { border-color: var(--accent); color: var(--ink-strong); }\n.ep-links { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 18px; font-family: var(--font-mono); font-size: 12.5px; }\n.ep-links a { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in oklab, var(--accent) 35%, transparent); }\n.ep-links a:hover { border-bottom-color: var(--accent); }\n\n/* ---------- worked-example timeline ---------- */\n.timeline { margin: 30px 0 8px; padding-left: 6px; }\n.tl-item { position: relative; padding: 0 0 26px 34px; border-left: 2px solid var(--border); margin-left: 7px; }\n.tl-item:last-child { border-left-color: transparent; padding-bottom: 4px; }\n.tl-item::before { content: ''; position: absolute; left: -8px; top: 1px; width: 14px; height: 14px; border-radius: 50%; background: var(--bg); border: 2px solid var(--accent); }\n.tl-item.reshape::before { border-radius: 3px; transform: rotate(45deg); }\n.tl-item .tl-when { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }\n.tl-item h4 { font-family: var(--font-head); font-weight: 600; font-size: 18px; margin: 6px 0 6px; color: var(--ink-strong); }\n.tl-item p { font-size: 16px; color: var(--muted); margin: 0; max-width: 60ch; }\n.tl-item p code, .tl-item .tl-when code { font-family: var(--font-mono); font-size: 0.84em; color: var(--ink); }\n.tl-item .tl-status { display: inline-flex; align-items: center; gap: 7px; margin-top: 9px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }\n.tl-item .tl-status .pip { width: 8px; height: 8px; border-radius: 50%; }\n.ex-grid { disp ">Boundaries<\u002Fa>\n      <a href=\"#lifecycle\">Lifecycle<\u002Fa>\n      <a href=\"#doctor\">Doctor<\u002Fa>\n      <a href=\"#adoption\">Adopt<\u002Fa>\n      <a class=\"tb-agents\" href=\"#endpoint\">For&nbsp;agents<\u002Fa>\n    <\u002Fspan>\n    <span class=\"canon\">Canon 2.2.0<\u002Fspan>\n    <button class=\"tb-theme\" id=\"tbTheme\" aria-label=\"Toggle color theme\">Paper<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n<div class=\"toc-backdrop\" id=\"tocBackdrop\"><\u002Fdiv>\n\n<nav class=\"toc\" id=\"toc\" aria-label=\"Contents\">\n  <p class=\"toc-label\">Contents<\u002Fp>\n  <ol>\n    <li><a href=\"#whatitis\"><span class=\"num\">01<\u002Fspan>What this is<\u002Fa><\u002Fli>\n    <li><a href=\"#claims\"><span class=\"num\">02<\u002Fspan>Claims &amp; failure modes<\u002Fa><\u002Fli>\n    <li><a href=\"#boundaries\"><span class=\"num\">03<\u002Fspan>The Seven Boundaries<\u002Fa><\u002Fli>\n    <li><a href=\"#roles\"><span class=\"num\">04<\u002Fspan>Roles &amp; continuity<\u002Fa><\u002Fli>\n    <li><a href=\"#layout\"><span class=\"num\">05<\u002Fspan>Repository layout<\u002Fa><\u002Fli>\n    <li><a href=\"#ids\"><span class=\"num\">06<\u002Fspan>IDs &amp; references<\u002Fa><\u002Fli>\n    <li><a href=\"#anatomy\"><span class=\"num\">07<\u002Fspan>Spec anatomy<\u002Fa><\u002Fli>\n    <li><a href=\"#lifecycle\"><span class=\"num\">08<\u002Fspan>Lifecycle<\u002Fa><\u002Fli>\n    <li><a href=\"#doctor\"><span class=\"num\">09<\u002Fspan>The Doctor<\u002Fa><\u002Fli>\n    <li><a href=\"#instrumentation\"><span class=\"num\">10<\u002Fspan>Instrumentation<\u002Fa><\u002Fli>\n    <li><a href=\"#adoption\"><span class=\"num\">11<\u002Fspan>Adoption<\u002Fa><\u002Fli>\n    <li><a href=\"#breakage\"><span class=\"num\">12<\u002Fspan>When a rule breaks<\u002Fa><\u002Fli>\n  <\u002Fol>\n<\u002Fnav>\n\n<!-- ============ COVER ============ -->\n<section class=\"cover\" id=\"cover\">\n  <div class=\"cover-inner\">\n    <div class=\"cover-top\">\n      <span>The Canon · A working contract<\u002Fspan>\n      <span>Spec Flow 2.2.0 · Proposal<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cover-body\">\n      <div>\n        <h1>One owner.<br>Many agents.<br><span class=\"a\">One<\u002Fspan> source of truth.<\u002Fh1>\n        <p class=\"cover-sub\">An operating system for product delivery. Plans live in the repo as <strong>versioned, validated artifacts<\u002Fstrong>; agents build from them; shipped work graduates into a permanent product memory — and the contract for every shipped feature is archived, never deleted.<\u002Fp>\n        <div class=\"cover-ctas\">\n          <a class=\"btn-primary\" href=\"#whatitis\">Read the canon&nbsp;&nbsp;↓<\u002Fa>\n          <a class=\"btn-link\" href=\"#adoption\">Adopt Tier&nbsp;0 in an afternoon<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <aside class=\"colophon\">\n        <div class=\"co-row\"><span class=\"co-k\">RATIONS<\u002Fspan><span class=\"co-v\">judgment · context · verification<\u002Fspan><\u002Fdiv>\n        <div class=\"co-row\"><span class=\"co-k\">FREE<\u002Fspan><span class=\"co-v\">agent time<\u002Fspan><\u002Fdiv>\n        <div class=\"co-row\"><span class=\"co-k\">GATES<\u002Fspan><span class=\"co-v\"><span class=\"hl\">ratify<\u002Fspan> · <span class=\"hl\">accept<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"co-row\"><span class=\"co-k\">LOOP<\u002Fspan><span class=\"co-v\">shape → ratify → build → graduate<\u002Fspan><\u002Fdiv>\n        <div class=\"co-row\"><span class=\"co-k\">RULES<\u002Fspan><span class=\"co-v\">seven boundaries<\u002Fspan><\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n    <div class=\"cover-strip\">\n      <a href=\"#boundaries\">The Seven Boundaries<\u002Fa>\n      <a href=\"#whatitis\">The Loop<\u002Fa>\n      <a href=\"#doctor\">The Doctor<\u002Fa>\n      <a href=\"#lifecycle\">Lifecycle<\u002Fa>\n      <a href=\"#adoption\">Adoption<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<main class=\"book\">\n\n<!-- ============ 01 ============ -->\n<section class=\"chapter\" id=\"whatitis\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 01<\u002Fp>\n    <h2>What this is<\u002Fh2>\n    <p class=\"chapter-meta\">The loop, and the one thing it rations<\u002Fp>\n\n    <p class=\"lead\">Spec Flow is an operating system for product delivery by <strong>one product owner directing many AI agents<\u002Fstrong>. Plans live inside the repo as versioned, validated artifacts. Agents build from them. Shipped work graduates into a permanent product memory, and the full contract for every shipped feature is archived, never deleted.<\u002Fp>\n\n    <p>The methodology rations the three resources that are actually scarce in agent-driven delivery — <strong>human judgment, context, and verification<\u002Fstrong> — and treats agent time as nearly free. Scrum rations human time with sprints. Shape Up rations risk with appetite and a six-week circuit breaker. Spec Flow rations the things that don't get cheaper when you add machines.<\u002Fp>\n\n    <figure>\n      <div class=\"loop-fig\">\n        <div class=\"loop-nodes\">\n          <div class=\"loop-node\">\n            <div class=\"ln\">01<\u002Fdiv><h5>Shape<\u002Fh5><div class=\"who\">agent + PO<\u002Fdiv>\n            <span class=\"arr\">→<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"loop-node\">\n            <div class=\"ln\">02<\u002Fdiv><h5>Ratify<\u002Fh5><div class=\"who\">PO — human gate<\u002Fdiv>\n            <span class=\"arr\">→<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"loop-node\">\n            <div class=\"ln\">03<\u002Fdiv><h5>Build<\u002Fh5><div class=\"who\">agent<\u002Fdiv>\n            <span class=\"arr\">→<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"loop-node\">\n            <div class=\"ln\">04<\u002Fdiv><h5>Graduate<\u002Fh5><div class=\"who\">agent · + archive<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"loop-return\">\n          <span class=\"tip\">↩<\u002Fspan>\n          <span class=\"lbl\">reshape is normal<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <figcaption>SHAPE → RATIFY → BUILD → GRADUATE. Reshape returns to shaping at any time — it is a transition, not a failure.<\u002Ffigcaption>\n    <\u002Ffigure>\n\n    <p>Two gates take human judgment: a person <strong>ratifies<\u002Fstrong> what gets built, and a person <strong>accepts<\u002Fstrong> that it's done. Everything between those gates is delegable to agents and automated by the contract. The system concentrates judgment at the two moments that need it and gets out of the way everywhere else.<\u002Fp>\n\n    <aside class=\"note\">\n      <span class=\"note-k\">Not a claim<\u002Fspan>\n      Spec Flow does not claim that structure substitutes for product judgment. It concentrates judgment — it does not manufacture it.\n    <\u002Faside>\n\n    <p>What follows is the contract: seven boundaries that <em>are<\u002Fem> the system, then the repository shapes, lifecycle, and validator that make the boundaries real. Read the boundaries first. Everything after them is implementation.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 02 ============ -->\n<section class=\"chapter\" id=\"claims\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 02<\u002Fp>\n    <h2>Claims &amp; failure modes<\u002Fh2>\n    <p class=\"chapter-meta\">Every promise names the condition under which it breaks<\u002Fp>\n\n    <div class=\"pull\"><p>A claim without a failure mode is marketing.<\u002Fp><\u002Fdiv>\n\n    <p>Each claim below names the mechanism that produces it and the condition under which it fails. If a benefit can't tell you when it stops working, it isn't an engineering property — it's a slogan.<\u002Fp>\n\n    <div class=\"tbl-wrap\">\n      <table class=\"book-table\">\n        <thead><tr><th>Claim<\u002Fth><th>Mechanism<\u002Fth><th>Fails when<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Cycle time in hours, not sprints<\u002Ftd><td>Specs sized to one review sitting; no ceremony calendar<\u002Ftd><td>The decider budget is breached — cycle time is gated by PO queue depth<\u002Ftd><\u002Ftr>\n          <tr><td>Parallel delivery, minimal coordination<\u002Ftd><td>The relations graph + deterministic ID allocation replace standups<\u002Ftd><td>Cross-repo edges are involved, or the graph itself goes stale<\u002Ftd><\u002Ftr>\n          <tr><td>Rework caught at the cheapest moment<\u002Ftd><td>Acceptance checks run <em>inside<\u002Fem> the implementation PR, not at a demo<\u002Ftd><td>Checks are written unfalsifiably — which is why unfalsifiable specs can't ratify<\u002Ftd><\u002Ftr>\n          <tr><td>Memory that survives staff &amp; models<\u002Ftd><td>Graduation produces descriptive knowledge; archive preserves contracts<\u002Ftd><td>Graduation is skipped — which is why it's wired to the PR, not to goodwill<\u002Ftd><\u002Ftr>\n          <tr><td>Audit trail<\u002Ftd><td>Every shipped ID resolves to an archived spec and a knowledge doc<\u002Ftd><td>Archive integrity breaks — a doctor error<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <p>Notice the pattern: most failure modes are designed to be caught by the validator or by one of the two human gates. The system doesn't promise it can't fail; it promises that when it fails, the failure is <strong>visible and recoverable<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 03 ============ -->\n<section class=\"chapter\" id=\"boundaries\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 03<\u002Fp>\n    <h2>The Seven Boundaries<\u002Fh2>\n    <p class=\"chapter-meta\">These rules are the system; everything else is implementation<\u002Fp>\n\n    <p>Each boundary is either enforced by the doctor or names the gate where a human enforces it. Together they ration judgment, context, and verification.<\u002Fp>\n\n    <div class=\"boundaries\">\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B1<\u002Fdiv>\n        <div>\n          <h3>The One-Sitting Rule<\u002Fh3>\n          <p>A spec must be small enough that the product owner can verify its acceptance checks in a <strong>single review sitting<\u002Fstrong>. Human attention is the appetite unit. If you can't review it in one pass, split it — IDs are cheap.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-human\">Gate · ratification<\u002Fspan> judgment-only<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B2<\u002Fdiv>\n        <div>\n          <h3>The Context Budget<\u002Fh3>\n          <p>A spec plus everything its relations force an agent to load must fit the repo's pinned budget <strong>with room left to think<\u002Fstrong>. Blowing the budget is a design smell — the feature is too entangled — not a loading problem.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-warn\">Doctor · warn<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B3<\u002Fdiv>\n        <div>\n          <h3>The Human Gate<\u002Fh3>\n          <p>Humans ratify and humans accept. Ratification is recorded — <code>ratified_by<\u002Fcode> + <code>ratified_at<\u002Fcode>, set by the named human's approving commit — so a rubber stamp at least has a name on it. <strong>A spec no human read before ratification did not need to exist.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-doctor\">Doctor · error<\u002Fspan> ratified without ratified_by<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B4<\u002Fdiv>\n        <div>\n          <h3>The TTL<\u002Fh3>\n          <p><code>building<\u002Fcode> and <code>blocked<\u002Fcode> each carry an expiry. Expiry <strong>quarantines the spec<\u002Fstrong>: the doctor errors on that spec's PRs and warns repo-wide — it never blocks unrelated work. Exit is an explicit reshape or kill. No silent extension.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-doctor\">Doctor · enforced<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B5<\u002Fdiv>\n        <div>\n          <h3>Falsifiable or Draft<\u002Fh3>\n          <p>A spec is not <code>ratified<\u002Fcode> until its acceptance checks can be executed by an agent or verified by a person in one sitting — and they are <em>actually executed<\u002Fem> in the implementation PR, results linked, before graduation. <strong>\"Improve the dashboard\" stays draft forever.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-doctor\">Doctor · error<\u002Fspan> graduation without an acceptance run<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B6<\u002Fdiv>\n        <div>\n          <h3>Intent Over Description<\u002Fh3>\n          <p>Documentation records what code cannot say: goals, non-goals, rejected options, evidence, business rules, boundaries. Code is the source of truth for mechanics; never compete with it. <strong>Strong models read code — what they can't read is your mind.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-human\">Gate · graduation<\u002Fspan> judgment-only<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard\">\n        <div class=\"bnum\">B7<\u002Fdiv>\n        <div>\n          <h3>The Decider Budget<\u002Fh3>\n          <p>A named decider may have at most <strong>3 specs in <code>building<\u002Fcode><\u002Fstrong> and <strong>6 in active states<\u002Fstrong> at once. Agent capacity is not the constraint; the decider's queue is. WIP limits on humans, not on machines.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"gate\"><span class=\"gate-tag gate-doctor\">Doctor · enforced<\u002Fspan> per-repo override allowed<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <aside class=\"note\">\n      <span class=\"note-k\">Why seven<\u002Fspan>\n      Scrum rations time. Shape Up rations risk. Spec Flow rations judgment, context, and verification — and these seven rules are the whole of it.\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 04 ============ -->\n<section class=\"chapter\" id=\"roles\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 04<\u002Fp>\n    <h2>Roles &amp; continuity<\u002Fh2>\n    <p class=\"chapter-meta\">Who owns what — and what happens when they're away<\u002Fp>\n\n    <p>One role is non-delegable. The decider — the product owner — decides what to build and that it's done. Everything else can be an agent's job.<\u002Fp>\n\n    <div class=\"tbl-wrap\">\n      <table class=\"book-table\">\n        <thead><tr><th>Work<\u002Fth><th>Owner<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Deciding what to build, and that it's done<\u002Ftd><td><strong>Decider (PO)<\u002Fstrong> — non-delegable<\u002Ftd><\u002Ftr>\n          <tr><td>Answering open questions<\u002Ftd><td>Named decider per entry<\u002Ftd><\u002Ftr>\n          <tr><td>Drafting &amp; critiquing specs<\u002Ftd><td>Agent; PO edits<\u002Ftd><\u002Ftr>\n          <tr><td>Building, testing, status upkeep<\u002Ftd><td>Agent<\u002Ftd><\u002Ftr>\n          <tr><td>Acceptance check execution<\u002Ftd><td>Agent, in the implementation PR<\u002Ftd><\u002Ftr>\n          <tr><td>Graduation editing pass<\u002Ftd><td>Agent, triggered by PR<\u002Ftd><\u002Ftr>\n          <tr><td>Structure validation<\u002Ftd><td><code>doctor<\u002Fcode>, in CI<\u002Ftd><\u002Ftr>\n          <tr><td>Meaning validation — tense, scope, sizing<\u002Ftd><td>Human, at the two gates<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <h3>Degrade to paused, never to improvised<\u002Fh3>\n    <p>Each repo names its deciders and one <strong>deputy<\u002Fstrong>. If a TTL expires or an open-question deadline passes while the decider is unavailable, the deputy decides. With no deputy, the agent applies the entry's stated default — that is what defaults are for — and the spec flips to <code>blocked<\u002Fcode> with its TTL set to the decider's stated return.<\u002Fp>\n    <div class=\"callout\">\n      <span class=\"ci\">▲<\u002Fspan>\n      <p>The system is designed to degrade to <strong>paused<\u002Fstrong>, never to improvised. An absent decider parks work safely; it never licenses an agent to guess at product intent.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 05 ============ -->\n<section class=\"chapter\" id=\"layout\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 05<\u002Fp>\n    <h2>Repository layout<\u002Fh2>\n    <p class=\"chapter-meta\">In-flight, shipped, and terminal — three states, three directories<\u002Fp>\n\n    <p>The plan, the shipped reality, and the historical record live in three separate trees. A spec's <em>directory<\u002Fem> is its lifecycle stage.<\u002Fp>\n\n    <figure>\n      <div class=\"codeblock\">\n        <div class=\"cb-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"fn\">docs/<\u002Fspan><\u002Fdiv>\n<pre class=\"tree\"><span class=\"dir\">docs/<\u002Fspan>\n├── architecture.md       <span class=\"cmt\"># System shape. Read first.<\u002Fspan>\n├── conventions/          <span class=\"cmt\"># Standards, templates, graduation prompt, canon pin<\u002Fspan>\n├── decisions/            <span class=\"cmt\"># Repo-local ADRs. Append-only once accepted.<\u002Fspan>\n├── strategy/             <span class=\"cmt\"># Vision, roadmaps, launch contracts. Dated.<\u002Fspan>\n├── technical/            <span class=\"cmt\"># Cross-cutting patterns. Only when non-obvious.<\u002Fspan>\n├── <span class=\"inflight\">specs/<\u002Fspan>                <span class=\"cmt\"># IN-FLIGHT work. Prescriptive. Temporary by design.<\u002Fspan>\n│   ├── .id-counter       <span class=\"cmt\"># Single source for ID allocation<\u002Fspan>\n│   └── NNNN-slug/\n├── <span class=\"shipped\">knowledge/<\u002Fspan>            <span class=\"cmt\"># SHIPPED reality. Descriptive. Permanent.<\u002Fspan>\n│   ├── NNNN-slug/        <span class=\"cmt\"># Graduated features (ID retained)<\u002Fspan>\n│   └── topic.md          <span class=\"cmt\"># Domain docs that map to no single feature<\u002Fspan>\n├── <span class=\"terminal\">archive/<\u002Fspan>              <span class=\"cmt\"># TERMINAL contracts. Permanent, read-only.<\u002Fspan>\n│   └── NNNN-slug/        <span class=\"cmt\"># Final spec.md of shipped, killed &amp; bug specs<\u002Fspan>\n└── relations-index.yml   <span class=\"gen\"># GENERATED by doctor --fix. Never hand-edited.<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <figcaption><span class=\"inflight\">specs/<\u002Fspan> is prescriptive and temporary · <span class=\"shipped\">knowledge/<\u002Fspan> is descriptive and permanent · <span class=\"terminal\">archive/<\u002Fspan> is the read-only record.<\u002Ffigcaption>\n    <\u002Ffigure>\n\n    <p>The word <em>\"features\"<\u002Fem> is retired entirely. Across four repos it meant four different things, and a word that ambiguous cannot carry a lifecycle. Separate <code>bugs/<\u002Fcode> trees are gone too: <strong>a bug is just a spec with <code>type: bug<\u002Fcode><\u002Fstrong>.<\u002Fp>\n\n    <aside class=\"note\">\n      <span class=\"note-k\">The move<\u002Fspan>\n      <code>docs/features/<\u002Fcode> → <code>specs/<\u002Fcode>. <code>product/features/<\u002Fcode> → <code>knowledge/<\u002Fcode>. <code>product/<\u002Fcode> retires; its contents disperse.\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 06 ============ -->\n<section class=\"chapter\" id=\"ids\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 06<\u002Fp>\n    <h2>IDs &amp; references<\u002Fh2>\n    <p class=\"chapter-meta\">Four digits, repo-local, never reused, never renumbered<\u002Fp>\n\n    <p>An ID is a four-digit zero-padded integer, local to its repo, never reused and never renumbered. Abandoned IDs stay burned.<\u002Fp>\n\n    <h3>Allocation protocol<\u002Fh3>\n    <p><code>docs/specs/.id-counter<\u002Fcode> holds the last allocated ID. Allocating means incrementing the counter and creating the folder <strong>in the same commit<\u002Fstrong>. Parallel worktrees that collide discover it at merge like any conflict — and the rule is <strong>later-merger renumbers<\u002Fstrong>, mechanical because nothing may reference an unratified ID yet.<\u002Fp>\n\n    <h3>References cite IDs, never lifecycle-managed paths<\u002Fh3>\n    <p>Write <code>spec 0007<\u002Fcode> or <code>0007-ranch-mgmt<\u002Fcode>. Resolution globs across all three trees:<\u002Fp>\n    <div class=\"codeblock\">\n      <div class=\"cb-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"fn\">resolve 0007<\u002Fspan><\u002Fdiv>\n<pre><span class=\"cmt\"># every allocated-and-ratified ID resolves forever —<\u002Fspan>\n<span class=\"cmt\"># because terminal states always land in archive/<\u002Fspan>\nglob docs/<span class=\"acc\">{specs,knowledge,archive}<\u002Fspan>/0007-*<\u002Fpre>\n    <\u002Fdiv>\n    <p>Cross-repo references use <code>repo:NNNN-slug<\u002Fcode>. In v2 the doctor validates repo-local edges as <strong>errors<\u002Fstrong> and cross-repo edges as <strong>warnings only<\u002Fstrong> — claiming more would require the doctor to read sibling-repo indexes, an open question. <em>We do not claim validation we cannot perform.<\u002Fem><\u002Fp>\n\n    <aside class=\"note\">\n      <span class=\"note-k\">Literal paths<\u002Fspan>\n      Legal only for non-lifecycle docs — <code>docs/technical/…<\u002Fcode>, <code>docs/decisions/…<\u002Fcode> — and the doctor verifies they resolve.\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 07 ============ -->\n<section class=\"chapter\" id=\"anatomy\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 07<\u002Fp>\n    <h2>Spec anatomy<\u002Fh2>\n    <p class=\"chapter-meta\">Identity in ten lines; the graph in one file; load only what you need<\u002Fp>\n\n    <p>A spec is a flat folder. Frontmatter carries identity and state — nothing else — so an agent can triage any spec from its first ten lines.<\u002Fp>\n\n    <div class=\"codeblock\">\n      <div class=\"cb-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"fn\">docs/specs/0007-ranch-mgmt/spec.md<\u002Fspan><\u002Fdiv>\n<pre><span class=\"dl\">---<\u002Fspan>\n<span class=\"k\">id:<\u002Fspan> <span class=\"v\">0007<\u002Fspan>\n<span class=\"k\">slug:<\u002Fspan> <span class=\"v\">ranch-mgmt<\u002Fspan>\n<span class=\"k\">type:<\u002Fspan> <span class=\"v\">feature<\u002Fspan>        <span class=\"cmt\"># feature | bug | chore<\u002Fspan>\n<span class=\"k\">status:<\u002Fspan> <span class=\"acc\">building<\u002Fspan>     <span class=\"cmt\"># draft | ratified | building | blocked | shipped | killed<\u002Fspan>\n<span class=\"k\">decider:<\u002Fspan> <span class=\"v\">jonathan<\u002Fspan>\n<span class=\"k\">ratified_by:<\u002Fspan> <span class=\"grn\">jonathan<\u002Fspan>     <span class=\"cmt\"># set by the ratifying human's commit<\u002Fspan>\n<span class=\"k\">ratified_at:<\u002Fspan> <span class=\"v\">2026-06-11<\u002Fspan>\n<span class=\"k\">created:<\u002Fspan> <span class=\"v\">2026-06-10<\u002Fspan>\n<span class=\"k\">ttl_expires:<\u002Fspan> <span class=\"v\">2026-06-18<\u002Fspan>   <span class=\"cmt\"># set on entering building or blocked<\u002Fspan>\n<span class=\"dl\">---<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <h3>The lifecycle as states<\u002Fh3>\n    <p><code>status<\u002Fcode> replaces presence-semantics — agents reliably miss the <em>absence<\u002Fem> of a file, so build-readiness is <code>status: ratified<\u002Fcode> plus a clean open-questions file.<\u002Fp>\n    <div class=\"states\">\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-draft)\"><\u002Fspan>draft<\u002Fspan>\n      <span class=\"sep\">→<\u002Fspan>\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-ratified)\"><\u002Fspan>ratified<\u002Fspan>\n      <span class=\"sep\">→<\u002Fspan>\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-building)\"><\u002Fspan>building<\u002Fspan>\n      <span class=\"sep\">⇄<\u002Fspan>\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-blocked)\"><\u002Fspan>blocked<\u002Fspan>\n      <span class=\"sep\">→<\u002Fspan>\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-shipped)\"><\u002Fspan>shipped<\u002Fspan>\n      <span class=\"sep\">/<\u002Fspan>\n      <span class=\"state-chip\"><span class=\"pip\" style=\"background:var(--st-killed)\"><\u002Fspan>killed<\u002Fspan>\n    <\u002Fdiv>\n    <p><code>shipped<\u002Fcode> and <code>killed<\u002Fcode> are set during archiving and exist only in <code>archive/<\u002Fcode>.<\u002Fp>\n\n    <h3>The spec body<\u002Fh3>\n    <ol class=\"book-list\">\n      <li><strong>Intent<\u002Fstrong> — the product outcome in plain language, and the appetite: what one-sitting scope this spec deliberately fits.<\u002Fli>\n      <li><strong>Non-goals<\u002Fstrong> — explicit. The most valuable section for strong models.<\u002Fli>\n      <li><strong>Behavior<\u002Fstrong> — observable, numbered, each verifiable from outside.<\u002Fli>\n      <li><strong>Business rules<\u002Fstrong> — <code>Must<\u002Fcode> / <code>Should<\u002Fcode> / <code>May<\u002Fcode>.<\u002Fli>\n      <li><strong>Critical files<\u002Fstrong> — pointers into existing code, not restatements of it.<\u002Fli>\n      <li><strong>Acceptance checks<\u002Fstrong> — falsifiable; executed in the implementation PR.<\u002Fli>\n      <li><strong>Out of scope / deferred<\u002Fstrong> — with IDs if already allocated.<\u002Fli>\n    <\u002Fol>\n    <p>Write intent and rules richly; write mechanics sparsely. The builder can read code — the spec's job is everything code can't say.<\u002Fp>\n\n    <h3>Relations: forward edges only<\u002Fh3>\n    <p>The graph lives in one file, authored as forward edges with a one-line <em>why<\u002Fem> for each. Reverse edges are generated, never hand-written — because two parallel PRs rewriting a third party's <code>relations.md<\u002Fcode> is a merge conflict baked into the happy path.<\u002Fp>\n    <div class=\"codeblock\">\n      <div class=\"cb-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"fn\">relations.md<\u002Fspan><\u002Fdiv>\n<pre><span class=\"k\">depends_on:<\u002Fspan>\n  - <span class=\"v\">0004-people-management<\u002Fspan>: <span class=\"cmt\">person records provide candidate identity<\u002Fspan>\n<span class=\"k\">part_of:<\u002Fspan> []          <span class=\"cmt\"># parent module, if this is a sub-feature<\u002Fspan>\n<span class=\"k\">supersedes:<\u002Fspan> []\n<span class=\"k\">conflicts_with:<\u002Fspan> []<\u002Fpre>\n    <\u002Fdiv>\n    <p>The <em>why<\u002Fem> is what lets an agent decide whether a related doc is worth its context budget. No sub-folders inside a spec folder: a module needing sub-specs gives each its own ID with <code>part_of<\u002Fcode>. Flat folders with explicit edges beat nested trees — agents traverse a declared graph reliably and discover hierarchies unreliably.<\u002Fp>\n\n    <h3>Selective loading<\u002Fh3>\n    <p>The file split exists for context economy, not tidiness. Load only what the task needs:<\u002Fp>\n    <div class=\"tbl-wrap\">\n      <table class=\"book-table\">\n        <thead><tr><th>Task<\u002Fth><th>Load<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Build<\u002Ftd><td><code>spec.md<\u002Fcode>, <code>relations.md<\u002Fcode>, <code>open-questions.md<\u002Fcode>; related docs per edge whys<\u002Ftd><\u002Ftr>\n          <tr><td>Product thinking / reshape<\u002Ftd><td><code>discovery.md<\u002Fcode>, <code>open-questions.md<\u002Fcode>, spec Intent + Non-goals<\u002Ftd><\u002Ftr>\n          <tr><td>Review PR against spec<\u002Ftd><td>Acceptance checks, <code>relations.md<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Resume / triage<\u002Ftd><td>frontmatter + <code>status.md<\u002Fcode><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 08 ============ -->\n<section class=\"chapter\" id=\"lifecycle\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 08<\u002Fp>\n    <h2>Lifecycle<\u002Fh2>\n    <p class=\"chapter-meta\">Two PRs, one canonical contract, and a graduation wired to the diff<\u002Fp>\n\n    <h3>The two-PR pattern<\u002Fh3>\n    <ol class=\"book-list\">\n      <li><strong>Spec PR<\u002Fstrong> — adds the spec folder. Optionally critiqued by a spec-critic agent; ratified by the named human, whose approving commit sets <code>ratified_by<\u002Fcode> / <code>ratified_at<\u002Fcode>. Merge to main <em>is<\u002Fem> the ratification event.<\u002Fli>\n      <li><strong>Implementation PR<\u002Fstrong> — the diff, referencing the spec ID, executing the acceptance checks (results linked), and containing graduation.<\u002Fli>\n    <\u002Fol>\n\n    <h3>Reshape is a normal transition<\u002Fh3>\n    <p>The merged spec on main is canonical, always. When a builder hits a contradiction mid-build, the spec flips to <code>blocked<\u002Fcode>; an amendment lands as a spec-amendment PR to main, approved by the decider — whose approval updates <code>ratified_at<\u002Fcode> and resets the TTL in the same commit. Then <code>building<\u002Fcode> resumes and the implementation branch rebases on the amended contract.<\u002Fp>\n    <div class=\"callout\">\n      <span class=\"ci\">↩<\u002Fspan>\n      <p>Re-ratification leaves a trace the doctor can read: <strong><code>ratified_at<\u002Fcode> newer than the spec-body changes, or it didn't happen.<\u002Fstrong> Reshaping is not a failure — it's the loop working.<\u002Fp>\n    <\u002Fdiv>\n\n    <h3>Graduation<\u002Fh3>\n    <p>An <strong>agent-executed editing pass wired to the implementation PR<\u002Fstrong>. The trigger is structural on purpose: v1 proved that an unowned graduation step never happens — every v1 repo's shipped directory was empty. The prompt lives at <code>docs/conventions/graduation.md<\u002Fcode> and does six things:<\u002Fp>\n    <ol class=\"book-list\">\n      <li>Create <code>docs/knowledge/NNNN-slug/<\u002Fcode> — same ID, same slug.<\u002Fli>\n      <li>Move the final <code>spec.md<\u002Fcode> (status <code>shipped<\u002Fcode>, acceptance link) to <code>docs/archive/NNNN-slug/<\u002Fcode>, preserved verbatim.<\u002Fli>\n      <li>Write knowledge docs: imperative → present descriptive, corrected to what actually shipped; keep intent, rules, rationale; cut anything code already says.<\u002Fli>\n      <li>Fold in ADRs accepted during the build that changed behavior.<\u002Fli>\n      <li>Carry forward edges into the knowledge folder; run <code>doctor --fix<\u002Fcode> to regenerate the index.<\u002Fli>\n      <li>Delete the spec folder — the contract now lives in <code>archive/<\u002Fcode>.<\u002Fli>\n    <\u002Fol>\n    <p>The result must read <em>shorter and more confident<\u002Fem> than the spec. The human acceptance gate then reviews the graduated knowledge doc with the archived checks one click away — <strong>\"is this what I decided?\"<\u002Fstrong> is a one-sitting question.<\u002Fp>\n\n    <h3>Bugs &amp; kills<\u002Fh3>\n    <p><strong>Bugs<\u002Fstrong> (<code>type: bug<\u002Fcode>) update the corrected knowledge doc and archive the bug spec as <code>shipped<\u002Fcode> — no new knowledge folder; the ID resolves in <code>archive/<\u002Fcode> forever. <strong>Kills<\u002Fstrong> move the spec to <code>archive/<\u002Fcode> with <code>status: killed<\u002Fcode> and a one-line tombstone: why, and decided by whom. IDs stay burned; edges pointing at a killed ID become doctor warnings prompting a re-route.<\u002Fp>\n\n    <h3>Precedence<\u002Fh3>\n    <div class=\"states\">\n      <span class=\"state-chip\">ADR<\u002Fspan><span class=\"sep\">&gt;<\u002Fspan>\n      <span class=\"state-chip\">spec<\u002Fspan><span class=\"sep\">&gt;<\u002Fspan>\n      <span class=\"state-chip\">knowledge doc<\u002Fspan>\n    <\u002Fdiv>\n    <p>ADRs cite affected IDs in their header so conflicts are findable; graduation folds accepted ADRs into knowledge docs, so a standing conflict should be rare and temporary. The archive is a historical record and outranks nothing.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 09 ============ -->\n<section class=\"chapter\" id=\"doctor\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 09<\u002Fp>\n    <h2>The Doctor<\u002Fh2>\n    <p class=\"chapter-meta\">A convention without a validator is a suggestion<\u002Fp>\n\n    <p><code>doctor<\u002Fcode> runs in CI and before any agent handoff. Its quarantine semantics keep one broken spec from halting the repo: <strong>spec-scoped violations<\u002Fstrong> error only on PRs touching that spec and warn repo-wide; <strong>repo-scoped violations<\u002Fstrong> error everywhere.<\u002Fp>\n\n    <div class=\"callout\">\n      <span class=\"ci\">⊘<\u002Fspan>\n      <p><strong>Quarantine, not gridlock.<\u002Fstrong> A TTL breach or a malformed spec errors on its own PRs and merely warns elsewhere — so there's never pressure to cheat a date to unblock unrelated work.<\u002Fp>\n    <\u002Fdiv>\n\n    <h3>What it checks<\u002Fh3>\n    <ul class=\"book-list\">\n      <li>Every <code>specs/NNNN-*<\u002Fcode> has <code>spec.md<\u002Fcode> + <code>relations.md<\u002Fcode>; frontmatter parses and matches the directory ID and slug.<\u002Fli>\n      <li><strong>ID integrity<\u002Fstrong> — unique across <code>specs/<\u002Fcode> + <code>knowledge/<\u002Fcode> + <code>archive/<\u002Fcode>; no ID ≤ <code>.id-counter<\u002Fcode> unaccounted for.<\u002Fli>\n      <li><code>ratified | building<\u002Fcode> requires <code>ratified_by<\u002Fcode> / <code>ratified_at<\u002Fcode>.<\u002Fli>\n      <li>Every repo-local edge resolves at some lifecycle stage (error); cross-repo edges warn; edges to killed IDs warn.<\u002Fli>\n      <li><code>relations-index.yml<\u002Fcode> consistent with authored forward edges — <code>--fix<\u002Fcode> regenerates it.<\u002Fli>\n      <li>Open-question entries parse (decider, options, default, deadline); past-deadline entries error; <code>ratified<\u002Fcode> with default-less entries errors.<\u002Fli>\n      <li><code>building | blocked<\u002Fcode> past <code>ttl_expires<\u002Fcode> → quarantine. TTL moved without a same-commit <code>ratified_at<\u002Fcode> update → error.<\u002Fli>\n      <li>Decider budget: &gt; 3 <code>building<\u002Fcode> or &gt; 6 active per decider → error.<\u002Fli>\n      <li>Context-budget proxy: <code>spec.md<\u002Fcode> + transitively forced loads vs. the pinned budget → warn.<\u002Fli>\n      <li>Graduation PR without linked acceptance-check results → error.<\u002Fli>\n      <li>Every relative path link under <code>docs/**<\u002Fcode> resolves.<\u002Fli>\n      <li>No <code>status.md<\u002Fcode>, open questions, or acceptance checks in <code>knowledge/<\u002Fcode>; <code>archive/<\u002Fcode> is exempt and read-only — edits after the archiving commit → error.<\u002Fli>\n    <\u002Ful>\n\n    <aside class=\"note\">\n      <span class=\"note-k\">Out of scope<\u002Fspan>\n      Judgment-only rules — one-sitting sizing, intent-over-description, tense, confidence — are explicitly <em>not<\u002Fem> the doctor's job. They live at the two human gates.\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 10 ============ -->\n<section class=\"chapter\" id=\"instrumentation\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 10<\u002Fp>\n    <h2>Instrumentation<\u002Fh2>\n    <p class=\"chapter-meta\">Diagnostic instruments, never targets<\u002Fp>\n\n    <p>Everything below is computable from frontmatter, the archive, and git — archiving is what makes the metrics cheap. They are diagnostics. <strong>The moment one becomes a goal, it stops measuring.<\u002Fstrong><\u002Fp>\n\n    <div class=\"tbl-wrap\">\n      <table class=\"book-table\">\n        <thead><tr><th>Instrument<\u002Fth><th>Reads<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Lead time<\u002Ftd><td><code>created<\u002Fcode> → <code>shipped<\u002Fcode>, from archived frontmatter<\u002Ftd><\u002Ftr>\n          <tr><td>Mid-build revision rate<\u002Ftd><td>% of shipped specs whose ratified sections changed between first ratification and archive. Expected band ≈ <strong>10–40%<\u002Fstrong>. Near zero → waterfall. Far above → shaping too thin. Read it; don't chase it.<\u002Ftd><\u002Ftr>\n          <tr><td>TTL outcomes<\u002Ftd><td>Breach count, and the reshape / kill split<\u002Ftd><\u002Ftr>\n          <tr><td>Graduation latency<\u002Ftd><td>Implementation merge → knowledge doc. Target: same PR — so this really measures violations of the same-PR rule.<\u002Ftd><\u002Ftr>\n          <tr><td>Doctor pass rate on main<\u002Ftd><td>Should be 100%. The CI-caught violation trend is the system paying for itself.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 11 ============ -->\n<section class=\"chapter\" id=\"adoption\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 11<\u002Fp>\n    <h2>Adoption<\u002Fh2>\n    <p class=\"chapter-meta\">The smallest viable adoption is one afternoon<\u002Fp>\n\n    <p>Adoption is tiered. A repo declares its tier in <code>docs/conventions/doc-architecture.md<\u002Fcode>, and the doctor checks only the rules of the declared tier. Ratchet up when the value is worth the rule.<\u002Fp>\n\n    <div class=\"tiers\">\n      <div class=\"tier\">\n        <div class=\"tname\"><span class=\"tn\">Tier 0<\u002Fspan>One spec<\u002Fdiv>\n        <div class=\"tdesc\">Create <code>docs/specs/<\u002Fcode>, <code>.id-counter<\u002Fcode>, and a single spec folder for the next piece of work. Run doctor. No lifecycle, no knowledge, no archive.<\u002Fdiv>\n        <div class=\"tval\">one validated,<br>buildable contract<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tier\">\n        <div class=\"tname\"><span class=\"tn\">Tier 1<\u002Fspan>The loop<\u002Fdiv>\n        <div class=\"tdesc\">Add ratification frontmatter, the two-PR pattern, graduation + <code>archive/<\u002Fcode>, and <code>knowledge/<\u002Fcode>.<\u002Fdiv>\n        <div class=\"tval\">product memory<br>&amp; audit trail<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tier\">\n        <div class=\"tname\"><span class=\"tn\">Tier 2<\u002Fspan>Full system<\u002Fdiv>\n        <div class=\"tdesc\">TTLs, decider budget, relations index, context budget, instrumentation.<\u002Fdiv>\n        <div class=\"tval\">parallel agents,<br>minimal coordination<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p>The worked end-to-end example — spec → amendment → graduated knowledge doc → archived contract — lives beside the proposal at <code>contracts/proposals/spec-flow-v2-example/<\u002Fcode>. Each repo migration is one agent run against this contract at Tier 0, verified by the doctor; tiers ratchet up per repo afterward.<\u002Fp>\n\n    <div class=\"endpoint\" id=\"endpoint\">\n      <p class=\"ep-eyebrow\">For agents<\u002Fp>\n      <h3>Your agent is a reader too.<\u002Fh3>\n      <p>This page is the human edition. The canon is also served as <strong>raw markdown an agent can load and operate from directly<\u002Fstrong> — no scraping the prose. Point a builder at the contract; point a crawler at <code>llms.txt<\u002Fcode>.<\u002Fp>\n      <div class=\"curl\">\n        <code><span class=\"prompt\">$<\u002Fspan> curl <span class=\"flag\">-s<\u002Fspan> https://specflow.dev/spec.md<\u002Fcode>\n        <button class=\"copy\" data-copy=\"curl -s https://specflow.dev/spec.md\">Copy<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ep-links\">\n        <a href=\"spec.md\">View raw canon → /spec.md<\u002Fa>\n        <a href=\"llms.txt\">/llms.txt<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 12 ============ -->\n<section class=\"chapter\" id=\"breakage\">\n  <div class=\"wrap\">\n    <p class=\"head-eyebrow\">Chapter 12<\u002Fp>\n    <h2>When a rule breaks<\u002Fh2>\n    <p class=\"chapter-meta\">The system defines recovery, not blame<\u002Fp>\n\n    <p>Breaches are expected. What matters is that each one has a defined, cheap recovery.<\u002Fp>\n\n    <div class=\"tbl-wrap\">\n      <table class=\"book-table\">\n        <thead><tr><th>Breach<\u002Fth><th>Recovery<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Doctor red on main<\u002Ftd><td>Fix-forward immediately; structural reds are always small. If recurring, the rule or the tier is wrong — amend the canon, don't route around it.<\u002Ftd><\u002Ftr>\n          <tr><td>Graduation skipped<\u002Ftd><td>Run the graduation prompt retroactively; the archive-integrity check finds the gap.<\u002Ftd><\u002Ftr>\n          <tr><td>TTL quarantine<\u002Ftd><td>Decider chooses reshape or kill within one sitting. Quarantine never blocks unrelated work, so there's no pressure to cheat the date.<\u002Ftd><\u002Ftr>\n          <tr><td>Gate bypassed<\u002Ftd><td>Revert the status flip; the spec returns to draft. <code>ratified_by<\u002Fcode> makes the bypass attributable.<\u002Ftd><\u002Ftr>\n          <tr><td>Decider absent<\u002Ftd><td>Deputy decides; no deputy → defaults apply and the spec parks <code>blocked<\u002Fcode> with TTL at the decider's return.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"endcta\">\n      <h3>Read it. Then build from it.<\u002Fh3>\n      <p>Spec Flow is one contract you and your team can implement against this afternoon. Start with one spec; let the tiers ratchet up as the value earns the rule.<\u002Fp>\n      <div class=\"row\">\n        <a class=\"btn-primary\" href=\"#adoption\">Start at Tier&nbsp;0&nbsp;&nbsp;→<\u002Fa>\n        <a class=\"btn-link\" href=\"#cover\">Back to the top<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer class=\"book-footer\">\n  <div class=\"wrap\">\n    <span>Spec Flow · Canon 2.2.0-draft · pins this canon, re-reviews on amendment<\u002Fspan>\n    <span>SHAPE → RATIFY → BUILD → GRADUATE<\u002Fspan>\n    <span>\"Spec Flow\" is a working name · <a href=\"spec.md\" style=\"color:var(--accent);text-decoration:none\">spec.md<\u002Fa> · <a href=\"llms.txt\" style=\"color:var(--accent);text-decoration:none\">llms.txt<\u002Fa><\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<!-- progress · scroll-spy · theme toggle · mobile TOC · copy buttons -->\n<script>\n(function () {\n  var progress = document.getElementById('progress');\n  var links = Array.prototype.slice.call(document.querySelectorAll('.toc a'));\n  var sections = links.map(function (a) { return document.querySelector(a.getAttribute('href')); });\n\n  function onScroll() {\n    var st = window.scrollY || document.documentElement.scrollTop;\n    var h = document.documentElement.scrollHeight - window.innerHeight;\n    progress.style.width = (h > 0 ? (st / h) * 100 : 0) + '%';\n    var idx = 0;\n    for (var i = 0; i < sections.length; i++) {\n      if (sections[i] && sections[i].getBoundingClientRect().top <= 120) idx = i;\n    }\n    links.forEach(function (a, i) { a.classList.toggle('active', i === idx); });\n  }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  window.addEventListener('resize', onScroll);\n  onScroll();\n\n  // ---- theme toggle (dark <-> paper), persisted ----\n  var root = document.documentElement;\n  var tbTheme = document.getElementById('tbTheme');\n  var KEY = 'specflow-theme';\n  function applyTheme(t) {\n    root.setAttribute('data-theme', t);\n    if (tbTheme) tbTheme.textContent = (t === 'dark') ? 'Paper' : 'Dark';\n  }\n  try {\n    var saved = localStorage.getItem(KEY);\n    if (saved === 'dark' || saved === 'paper') applyTheme(saved);\n  } catch (e) {}\n  if (tbTheme) tbTheme.addEventListener('click', function () {\n    var next = root.getAttribute('data-theme') === 'dark' ? 'paper' : 'dark';\n    applyTheme(next);\n    try { localStorage.setItem(KEY, next); } catch (e) {}\n  });\n\n  // ---- mobile TOC drawer ----\n  var menu = document.getElementById('tbMenu');\n  var backdrop = document.getElementById('tocBackdrop');\n  function closeToc() { document.body.classList.remove('toc-open'); if (menu) menu.setAttribute('aria-expanded', 'false'); }\n  function toggleToc() {\n    var open = document.body.classList.toggle('toc-open');\n    if (menu) menu.setAttribute('aria-expanded', open ? 'true' : 'false');\n  }\n  if (menu) menu.addEventListener('click', toggleToc);\n  if (backdrop) backdrop.addEventListener('click', closeToc);\n  links.forEach(function (a) { a.addEventListener('click', closeToc); });\n  window.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeToc(); });\n\n  // ---- copy buttons ----\n  document.querySelectorAll('.copy[data-copy]').forEach(function (btn) {\n    btn.addEventListener('click', function () {\n      var text = btn.getAttribute('data-copy');\n      var done = function () { var o = btn.textContent; btn.textContent = 'Copied'; setTimeout(function(){ btn.textContent = o; }, 1400); };\n      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(done).catch(done); }\n      else { done(); }\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
